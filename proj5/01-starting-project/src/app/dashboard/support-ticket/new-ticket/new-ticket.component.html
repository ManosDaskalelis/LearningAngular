 <!-- <form (ngSubmit)="onSubmit(titleInput)"> -->
 <form (ngSubmit)="onSubmit()" #form>
    <app-control labelText="Title">
        <!-- <label for="title">Title</label> -->
        <input name="title" id="title" #titleInput #input [(ngModel)] = "enteredTitle">
    </app-control>
    <app-control labelText="Request">
        <!-- <label for="request">Request</label> -->
        <textarea name="request" id="request" rows="3" #textInput #input></textarea>
    </app-control>
    <p>
        <button appButton>
            Submit
            <span ngProjectAs="icon">↦</span>
        </button>
    </p>
</form>
